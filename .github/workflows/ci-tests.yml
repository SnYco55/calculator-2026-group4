name: CI - Tests

on:
  push:
    branches: [ master, feature/ci-cd-workflows ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build and run all tests (JUnit + Cucumber)
        run: mvn -B clean verify --file pom.xml

      - name: Publish Surefire Test Report
        if: ${{ always() }}
        uses: scacap/action-surefire-report@v1.9.1

      - name: Upload test reports as artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
